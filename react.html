<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Pizza - React CRUD</title>
    <link href="style.css" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<header>
    <h1>Web programozás-1 Előadás Házi feladat</h1>
</header>

<nav>
    <ul>
        <li><a href="index.html">Kezdőoldal</a></li>
        <li><a href="javascript.html">Pizzák</a></li>
        <li><a href="fetchapi.html">Élő kínálat</a></li>
        <li><a href="react.html">Rendelések kezelés</a></li>
        <li><a href="index.html#how-to-order" onclick="mutasdARendelest(event)">Hogyan rendeljek?</a></li>
    </ul>
</nav>

<main id="react-app">
</main>

<footer>
    Neptun Kód: DAWGZX<br>
    Név: Kéri Koppány Győző
</footer>

<script type="text/babel">
    const { useState } = React;

    function RendelesKezelo() {
        // Valós adatok az adatbázisodból
        const [rendelesek, setRendelesek] = useState([
            { id: 1, nev: "Popey", db: 2, felvetel: "2005.11.12 11:21:00", kiszallitas: "2005.11.12 12:11:00" },
            { id: 2, nev: "Kagylós", db: 1, felvetel: "2005.11.12 11:41:00", kiszallitas: "2005.11.12 12:26:00" },
            { id: 3, nev: "Barbecue chicken", db: 1, felvetel: "2005.11.12 12:38:00", kiszallitas: "2005.11.12 13:02:00" },
            { id: 4, nev: "Röfi", db: 1, felvetel: "2005.11.12 13:18:00", kiszallitas: "2005.11.12 13:58:00" },
            { id: 5, nev: "Tündi kedvence", db: 1, felvetel: "2005.11.12 13:44:00", kiszallitas: "2005.11.12 16:53:00" }
        ]);

        const [form, setForm] = useState({ id: null, nev: '', db: '', felvetel: '', kiszallitas: '' });

        const mentes = (e) => {
            e.preventDefault();
            if(!form.nev || !form.db) {
                alert("A pizza nevét és a darabszámot kötelező megadni!");
                return;
            }

            if (form.id) {
                // Módosítás
                setRendelesek(rendelesek.map(r => r.id === form.id ? form : r));
            } else {
                // Új hozzáadása
                setRendelesek([...rendelesek, {
                    ...form,
                    id: Date.now(),
                    felvetel: form.felvetel || new Date().toLocaleString()
                }]);
            }
            setForm({ id: null, nev: '', db: '', felvetel: '', kiszallitas: '' });
        };

        const torles = (id) => {
            if(confirm("Biztosan törli ezt a rendelést?")) {
                setRendelesek(rendelesek.filter(r => r.id !== id));
            }
        };

        return (
            <section>
                <h2>Rendelések kezelése</h2>

                <form onSubmit={mentes} style={{ marginBottom: "20px" }}>
                    <input type="text" placeholder="Pizza neve" value={form.nev} onChange={e => setForm({...form, nev: e.target.value})} required />
                    <input type="number" placeholder="Darab" value={form.db} onChange={e => setForm({...form, db: parseInt(e.target.value)})} required />
                    <input type="text" placeholder="Felvétel ideje" value={form.felvetel} onChange={e => setForm({...form, felvetel: e.target.value})} />
                    <input type="text" placeholder="Kiszállítás ideje" value={form.kiszallitas} onChange={e => setForm({...form, kiszallitas: e.target.value})} />
                    <button type="submit" style={{ backgroundColor: "darkgreen", color: "white" }}>
                        {form.id ? "Módosítás mentése" : "Új rendelés felvétele"}
                    </button>
                    {form.id && <button type="button" onClick={() => setForm({ id: null, nev: '', db: '', felvetel: '', kiszallitas: '' })}>Mégse</button>}
                </form>

                <table border="1" style={{ width: '100%', marginTop: '20px', borderCollapse: 'collapse' }}>
                    <thead>
                    <tr style={{ backgroundColor: '#eee' }}>
                        <th>Pizza neve</th>
                        <th>Darab</th>
                        <th>Felvétel</th>
                        <th>Kiszállítás</th>
                        <th>Műveletek</th>
                    </tr>
                    </thead>
                    <tbody>
                    {rendelesek.map(r => (
                        <tr key={r.id}>
                            <td>{r.nev}</td>
                            <td>{r.db}</td>
                            <td>{r.felvetel || '-'}</td>
                            <td>{r.kiszallitas || '-'}</td>
                            <td>
                                <button onClick={() => setForm(r)}>Szerkesztés</button>
                                <button onClick={() => torles(r.id)} style={{ backgroundColor: '#c0392b', color: 'white' }}>Törlés</button>
                            </td>
                        </tr>
                    ))}
                    </tbody>
                </table>
            </section>
        );
    }

    ReactDOM.createRoot(document.getElementById('react-app')).render(<RendelesKezelo />);

    // A menü működéséhez szükséges script
    function mutasdARendelest(e) {
        e.preventDefault();
        window.location.href = "index.html#how-to-order";
    }
</script>
</body>
</html>
